name: material-vision-demo
seed: 42
data:
  root: artifacts/dataset
  batch_size: 4
  augment: false
model:
  backbone: numpy_spectral
  num_classes: 4
  class_names:
    - PET
    - HDPE
    - MixedPaper
    - Aluminum
training:
  epochs: 3
  lr: 0.05
  min_lr: 0.005
  warmup_epochs: 1
  scheduler: true
  early_stopping: false
evaluation:
  metrics:
    - accuracy
inference:
  threshold: 0.5
